<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ultra Max | All-in-One Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0a; --panel: #161616; --border: #2c2c2c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER --- */
        .header { height: 60px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; color: var(--accent); font-size: 20px; letter-spacing: 1px; }

        /* --- VIEWPORT (PHOTO AREA) --- */
        .viewport { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; padding: 20px; }
        #mainImg { max-width: 100%; max-height: 100%; display: none; }
        #overlayImg { position: absolute; width: 150px; border: 2px dashed var(--accent); pointer-events: none; opacity: 0.6; display: none; z-index: 5; }

        /* --- CONTROL PANEL (BOTTOM) --- */
        .controls-container { background: var(--panel); border-top: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Navigation Tabs */
        .nav-tabs { display: flex; overflow-x: auto; background: #111; border-bottom: 1px solid var(--border); }
        .tab-link { flex: 1; min-width: 80px; padding: 12px; border: none; background: none; color: #888; cursor: pointer; transition: 0.3s; font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .tab-link i { font-size: 18px; display: block; margin-bottom: 5px; }
        .tab-link.active { color: var(--accent); background: #1a1a1a; }

        /* Content Area */
        .tab-content { display: none; padding: 20px; max-height: 300px; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* Tool Grid & UI Elements */
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .btn-tool { padding: 10px; background: #252525; border: 1px solid #333; color: white; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-tool:hover { background: var(--accent); color: black; }
        
        .slider-wrap { margin-bottom: 15px; background: #1e1e1e; padding: 12px; border-radius: 10px; }
        .slider-wrap label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .input-style { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; }

        /* --- FOOTER ACTIONS --- */
        .footer-actions { display: flex; gap: 10px; padding: 15px; background: var(--panel); border-top: 1px solid var(--border); }
        .btn-action { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; text-align: center; text-decoration: none; }
        .btn-reset { background: #333; color: white; }
        .btn-save { background: var(--accent); color: #000; }
        #downloadBtn { background: #00e676; color: white; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ULTRA<span>MAX</span></div>
        <button class="btn-tool" onclick="document.getElementById('fileIn').click()"><i class="fa-solid fa-plus"></i> OPEN</button>
        <input type="file" id="fileIn" hidden accept="image/*">
    </div>

    <div class="viewport">
        <div id="loader">Upload Photo to Begin</div>
        <img id="mainImg">
        <img id="overlayImg">
    </div>

    <div class="controls-container" id="editorUI" style="display:none;">
        <div class="nav-tabs">
            <button class="tab-link active" onclick="showTab(event, 'tab-crop')"><i class="fa-solid fa-crop"></i>CROP</button>
            <button class="tab-link" onclick="showTab(event, 'tab-light')"><i class="fa-solid fa-sun"></i>LIGHT</button>
            <button class="tab-link" onclick="showTab(event, 'tab-color')"><i class="fa-solid fa-droplet"></i>COLOR</button>
            <button class="tab-link" onclick="showTab(event, 'tab-overlay')"><i class="fa-solid fa-clone"></i>OVERLAY</button>
            <button class="tab-link" onclick="showTab(event, 'tab-text')"><i class="fa-solid fa-t"></i>TEXT</button>
            <button class="tab-link" onclick="showTab(event, 'tab-stickers')"><i class="fa-solid fa-face-smile"></i>STICKERS</button>
        </div>

        <div id="tab-crop" class="tab-content active">
            <div class="tool-grid">
                <button class="btn-tool" onclick="cropper.setAspectRatio(NaN)">Free</button>
                <button class="btn-tool" onclick="cropper.setAspectRatio(1)">1:1</button>
                <button class="btn-tool" onclick="cropper.setAspectRatio(16/9)">16:9</button>
                <button class="btn-tool" onclick="cropper.setAspectRatio(4/5)">4:5</button>
                <button class="btn-tool" onclick="cropper.rotate(-90)"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="btn-tool" onclick="cropper.rotate(90)"><i class="fa-solid fa-rotate-right"></i></button>
                <button class="btn-tool" onclick="cropper.scaleX(cropper.getData().scaleX === 1 ? -1 : 1)"><i class="fa-solid fa-arrows-left-right"></i></button>
            </div>
        </div>

        <div id="tab-light" class="tab-content">
            <div class="slider-wrap"><label>Brightness <span id="v-br">100%</span></label><input type="range" id="br" min="0" max="200" value="100"></div>
            <div class="slider-wrap"><label>Contrast <span id="v-ct">100%</span></label><input type="range" id="ct" min="0" max="200" value="100"></div>
            <div class="slider-wrap"><label>Exposure <span id="v-ex">100%</span></label><input type="range" id="ex" min="0" max="200" value="100"></div>
        </div>

        <div id="tab-color" class="tab-content">
            <div class="slider-wrap"><label>Saturation <span id="v-sa">100%</span></label><input type="range" id="sa" min="0" max="200" value="100"></div>
            <div class="slider-wrap"><label>Hue Rotate <span id="v-hu">0°</span></label><input type="range" id="hu" min="0" max="360" value="0"></div>
            <div class="slider-wrap"><label>Sepia <span id="v-se">0%</span></label><input type="range" id="se" min="0" max="100" value="0"></div>
        </div>

        <div id="tab-overlay" class="tab-content">
            <button class="btn-tool" style="width:100%; margin-bottom:15px;" onclick="document.getElementById('fileOver').click()">Select Overlay Photo</button>
            <input type="file" id="fileOver" hidden accept="image/*">
            <div class="slider-wrap"><label>Opacity <span id="v-op">50%</span></label><input type="range" id="op" min="0" max="100" value="50"></div>
        </div>

        <div id="tab-text" class="tab-content">
            <input type="text" id="uText" class="input-style" placeholder="Type caption here...">
            <div style="display:flex; gap:10px;">
                <input type="color" id="uColor" value="#ffffff" style="flex:1; height:45px; border:none; cursor:pointer;">
                <input type="number" id="uSize" value="60" class="input-style" style="flex:1;">
            </div>
        </div>

        <div id="tab-stickers" class="tab-content">
            <div class="tool-grid">
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('🔥')">🔥</button>
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('✨')">✨</button>
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('❤️')">❤️</button>
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('😎')">😎</button>
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('👑')">👑</button>
                <button class="btn-tool" style="font-size:25px;" onclick="setSticker('✅')">✅</button>
            </div>
        </div>

        <div class="footer-actions">
            <button class="btn-action btn-reset" onclick="location.reload()">RESET ALL</button>
            <button class="btn-action btn-save" id="renderBtn">APPLY & PROCESS</button>
        </div>
        <a id="downloadBtn" class="btn-action">DOWNLOAD FINAL IMAGE</a>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper, sticker = null;
    const fileIn = document.getElementById('fileIn'), fileOver = document.getElementById('fileOver');
    const mainImg = document.getElementById('mainImg'), overImg = document.getElementById('overlayImg');
    const editorUI = document.getElementById('editorUI'), downloadBtn = document.getElementById('downloadBtn');

    // Filter Sliders
    const br=document.getElementById('br'), ct=document.getElementById('ct'), ex=document.getElementById('ex'),
          sa=document.getElementById('sa'), hu=document.getElementById('hu'), se=document.getElementById('se'), op=document.getElementById('op');

    function updateFilters() {
        document.getElementById('v-br').innerText = br.value+'%'; document.getElementById('v-ct').innerText = ct.value+'%';
        document.getElementById('v-ex').innerText = ex.value+'%'; document.getElementById('v-sa').innerText = sa.value+'%';
        document.getElementById('v-hu').innerText = hu.value+'°'; document.getElementById('v-se').innerText = se.value+'%';
        document.getElementById('v-op').innerText = op.value+'%';
        
        const filterStr = `brightness(${br.value}%) contrast(${ct.value}%) saturate(${sa.value}%) hue-rotate(${hu.value}deg) sepia(${se.value}%) opacity(${ex.value}%)`;
        if(document.querySelector('.cropper-container')) document.querySelector('.cropper-container').style.filter = filterStr;
        overImg.style.opacity = op.value / 100;
    }
    [br, ct, ex, sa, hu, se, op].forEach(i => i.oninput = updateFilters);

    // File Handlers
    fileIn.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                mainImg.src = ev.target.result;
                document.getElementById('loader').style.display = 'none';
                mainImg.style.display = 'block';
                if (cropper) cropper.destroy();
                mainImg.onload = () => {
                    editorUI.style.display = 'block';
                    cropper = new Cropper(mainImg, { viewMode: 1, dragMode: 'move', autoCropArea: 1 });
                };
            };
            reader.readAsDataURL(file);
        }
    };

    fileOver.onchange = (e) => {
        const file = e.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = (ev) => { overImg.src = ev.target.result; overImg.style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    };

    function showTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function setSticker(s) { sticker = s; alert("Sticker "+s+" Selected!"); }

    // RENDER LOGIC
    document.getElementById('renderBtn').onclick = () => {
        const canvas = cropper.getCroppedCanvas();
        const final = document.createElement('canvas');
        final.width = canvas.width; final.height = canvas.height;
        const ctx = final.getContext('2d');

        // 1. Photo + Filters
        ctx.filter = `brightness(${br.value}%) contrast(${ct.value}%) saturate(${sa.value}%) hue-rotate(${hu.value}deg) sepia(${se.value}%)`;
        ctx.drawImage(canvas, 0, 0);

        // 2. Overlay
        if(overImg.src && overImg.style.display !== 'none') {
            ctx.filter = "none"; ctx.globalAlpha = op.value / 100;
            ctx.drawImage(overImg, 0, 0, final.width, final.height);
            ctx.globalAlpha = 1.0;
        }

        // 3. Sticker (Center)
        if(sticker) {
            ctx.font = `${final.width/4}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(sticker, final.width/2, final.height/2);
        }

        // 4. Text (Bottom)
        const txt = document.getElementById('uText').value;
        if(txt) {
            ctx.fillStyle = document.getElementById('uColor').value;
            ctx.font = `bold ${document.getElementById('uSize').value}px sans-serif`;
            ctx.textAlign = "center";
            ctx.fillText(txt, final.width/2, final.height - 50);
        }

        downloadBtn.href = final.toDataURL('image/png');
        downloadBtn.download = 'studio_ultra_max.png';
        downloadBtn.style.display = 'block';
        alert("Done! Your masterpiece is ready.");
    };
</script>
</body>
</html>
