<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Crop Tool</title>

<link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.min.css">

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

.container {
    margin-top: 20px;
}

input {
    padding: 10px;
    background: white;
    color: black;
    border-radius: 5px;
}

img {
    max-width: 95%;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: cyan;
    border: none;
    font-weight: bold;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>📸 Simple Crop Tool</h2>

<div class="container">

    <!-- Upload Button -->
    <input type="file" id="upload" accept="image/*">

    <br>

    <!-- Image -->
    <img id="image">

    <br>

    <!-- Crop Button -->
    <button onclick="cropImage()">Crop & Download</button>

</div>

<script src="https://unpkg.com/cropperjs"></script>

<script>
let cropper = null;
const image = document.getElementById('image');

document.getElementById('upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    image.src = url;

    image.onload = function() {
        if (cropper) {
            cropper.destroy();
        }

        cropper = new Cropper(image, {
            viewMode: 1,
            autoCropArea: 1
        });
    };
});

function cropImage() {
    if (!cropper) {
        alert("Pehle photo upload karo!");
        return;
    }

    const canvas = cropper.getCroppedCanvas();

    if (!canvas) {
        alert("Crop nahi ho raha!");
        return;
    }

    const link = document.createElement('a');
    link.href = canvas.toDataURL("image/png");
    link.download = "cropped.png";
    link.click();
}
</script>

</body>
</html>
