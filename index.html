<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monty Form</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form Box */
.form-box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 330px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

h2 {
    text-align: center;
    margin-bottom: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus, textarea:focus, select:focus {
    border-color: #ff758c;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.popup-box h3 {
    color: green;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="form-box">
<h2>Monty Form</h2>

<form id="myForm">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<select name="class" required>
<option value="">Select Class</option>
<option value="10">Class 10</option>
<option value="11">Class 11</option>
<option value="12">Class 12</option>
</select>

<select name="institution_type" required>
<option value="">School or College</option>
<option value="School">School</option>
<option value="College">College</option>
</select>

<input type="text" name="institution_name" placeholder="School / College Name" required>

<textarea name="message" placeholder="Your Message"></textarea>

<button type="submit">Submit</button>

</form>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>✅ Thank You!</h3>
        <p>Your form has been submitted.</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
const form = document.getElementById("myForm");
const popup = document.getElementById("popup");

form.addEventListener("submit", function(e){
    e.preventDefault();

    fetch("https://formsubmit.co/montysharma4305@gmail.com", {
        method: "POST",
        body: new FormData(form)
    }).then(() => {
        popup.style.display = "flex";
        form.reset();
    });
});

function closePopup(){
    popup.style.display = "none";
}
</script>

</body>
</html>
