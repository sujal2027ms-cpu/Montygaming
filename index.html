<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Black Calculator</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="icon.jpg">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Pro%20Black%20Calculator%22,%22short_name%22:%22Calculator%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%23000000%22,%22icons%22:[{%22src%22:%22icon.jpg%22,%22sizes%22:%22512x512%22,%22type%22:%22image/jpeg%22}]}">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #000; height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
        .calculator { width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; padding: 20px; }
        .display { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding-bottom: 20px; }
        #screen { width: 100%; background: transparent; border: none; outline: none; text-align: right; color: #fff; font-size: 4.5rem; }
        .buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-bottom: 20px; }
        .btn { height: 75px; border-radius: 50px; border: none; background: #1c1c1e; color: #fff; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; }
        .operator { background: #2c2c2e; color: #00ff9d; }
        .equal { background: #00ff9d; color: #000; font-weight: bold; }
        
        /* Custom Install Pop-up Style */
        #download-popup {
            position: fixed;
            bottom: -100%; /* Shuru mein chhupa rahega */
            left: 0; width: 100%;
            background: #1c1c1e;
            padding: 20px;
            border-top: 2px solid #00ff9d;
            border-radius: 20px 20px 0 0;
            transition: 0.5s;
            z-index: 9999;
            text-align: center;
        }
        #download-popup.show { bottom: 0; }
        .dl-btn { background: #00ff9d; color: #000; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display"><input type="text" id="screen" value="0" readonly></div>
        <div class="buttons-grid">
            <button class="btn operator" style="grid-column: span 2;" onclick="screen.value='0'">C</button>
            <button class="btn operator" onclick="add('÷')">÷</button>
            <button class="btn operator" onclick="add('×')">×</button>
            <button class="btn" onclick="add('7')">7</button><button class="btn" onclick="add('8')">8</button><button class="btn" onclick="add('9')">9</button>
            <button class="btn operator" onclick="add('-')">−</button>
            <button class="btn" onclick="add('4')">4</button><button class="btn" onclick="add('5')">5</button><button class="btn" onclick="add('6')">6</button>
            <button class="btn operator" onclick="add('+')">+</button>
            <button class="btn" onclick="add('1')">1</button><button class="btn" onclick="add('2')">2</button><button class="btn" onclick="add('3')">3</button>
            <button class="btn equal" onclick="calc()">=</button>
            <button class="btn" style="grid-column: span 2;" onclick="add('0')">0</button>
            <button class="btn" onclick="add('.')">.</button>
            <button class="btn" onclick="back()" style="color:#ffa502">DEL</button>
        </div>
    </div>

    <div id="download-popup">
        <img src="icon.jpg" width="60" style="border-radius: 10px; margin-bottom: 10px;">
        <h3>Install Pro Calculator</h3>
        <p style="color: #aaa; font-size: 0.9rem;">Ise app ki tarah use karne ke liye install karein</p>
        <button class="dl-btn" id="installBtn">INSTALL NOW</button>
        <p style="margin-top: 10px; font-size: 0.8rem;" onclick="hidePopup()">Nahi, baad mein</p>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const popup = document.getElementById('download-popup');
        let deferredPrompt;

        function add(v) { if(screen.value==='0') screen.value=v; else screen.value+=v; }
        function back() { screen.value = screen.value.length>1 ? screen.value.slice(0,-1) : '0'; }
        function calc() { try { screen.value = eval(screen.value.replace(/×/g,'*').replace(/÷/g,'/')); } catch(e){ screen.value="Error"; } }
        function hidePopup() { popup.classList.remove('show'); }

        // Jab browser install ke liye ready ho
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 3 second baad pop-up dikhao
            setTimeout(() => { popup.classList.add('show'); }, 3000);
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') hidePopup();
                deferredPrompt = null;
            }
        });

        // Service Worker (Zaroori hai download pop-up ke liye)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa("self.addEventListener('fetch', (e) => {});"));
        }
    </script>
</body>
</html>
