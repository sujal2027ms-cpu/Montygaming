<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Image Studio Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #3d5afe; --bg: #0a0a0c; --panel: #16161a; --text: #e1e1e6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        .main-wrapper { display: flex; height: 100vh; }

        /* Left Side: Editor */
        .editor-section { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 100%; display: none; }

        /* Right Side: Sidebar Controls */
        .sidebar { width: 350px; background: var(--panel); border-left: 1px solid #29292e; padding: 20px; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        h3 { font-size: 0.8rem; text-transform: uppercase; color: #737380; margin: 20px 0 10px; letter-spacing: 1px; }

        /* Tools & Adjustment Buttons */
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .tool-btn { background: #29292e; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .tool-btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* Sliders */
        .slider-box { margin-bottom: 15px; background: #202024; padding: 12px; border-radius: 10px; }
        .slider-box label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Action Buttons */
        .action-btns { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .btn-main { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-render { background: var(--accent); color: white; }
        .btn-download { background: #04d361; color: white; display: none; text-decoration: none; text-align: center; }
        .btn-upload { background: #fff; color: #000; margin-bottom: 20px; width: 100%; }

        /* Aspect Ratio */
        .ratio-chips { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .chip { padding: 5px 10px; background: #29292e; border-radius: 5px; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
        .chip.active { border-color: var(--accent); background: rgba(61, 90, 254, 0.2); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="editor-section">
        <div class="canvas-area">
            <h1 id="dropMsg" style="opacity: 0.3;">Please Upload a Photo</h1>
            <img id="image">
        </div>
    </div>

    <div class="sidebar">
        <h2><i class="fa-solid fa-sliders"></i> Adjust & Edit</h2>
        
        <input type="file" id="upload" hidden accept="image/*">
        <button class="btn-main btn-upload" onclick="document.getElementById('upload').click()">
            <i class="fa-solid fa-file-import"></i> New Image
        </button>

        <div id="controls" style="display: none;">
            <h3>Adjust Position</h3>
            <div class="tool-grid">
                <button class="tool-btn" onclick="cropper.zoom(0.1)" title="Zoom In"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                <button class="tool-btn" onclick="cropper.zoom(-0.1)" title="Zoom Out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                <button class="tool-btn" onclick="cropper.rotate(-90)" title="Rotate Left"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="tool-btn" onclick="cropper.rotate(90)" title="Rotate Right"><i class="fa-solid fa-rotate-right"></i></button>
                <button class="tool-btn" onclick="cropper.scaleX(cropper.getData().scaleX === 1 ? -1 : 1)" title="Flip H"><i class="fa-solid fa-arrows-left-right"></i></button>
                <button class="tool-btn" onclick="cropper.scaleY(cropper.getData().scaleY === 1 ? -1 : 1)" title="Flip V"><i class="fa-solid fa-arrows-up-down"></i></button>
                <button class="tool-btn" onclick="cropper.setDragMode('move')" title="Move Mode"><i class="fa-solid fa-up-down-left-right"></i></button>
                <button class="tool-btn" onclick="cropper.setDragMode('crop')" title="Crop Mode"><i class="fa-solid fa-crop-simple"></i></button>
            </div>

            <h3>Aspect Ratio</h3>
            <div class="ratio-chips">
                <div class="chip active" onclick="setR(NaN, this)">Free</div>
                <div class="chip" onclick="setR(1, this)">1:1</div>
                <div class="chip" onclick="setR(16/9, this)">16:9</div>
                <div class="chip" onclick="setR(4/5, this)">4:5</div>
            </div>

            <h3>Color Filters</h3>
            <div class="slider-box">
                <label>Brightness <span id="b-val">100%</span></label>
                <input type="range" id="brightness" min="0" max="200" value="100">
            </div>
            <div class="slider-box">
                <label>Contrast <span id="c-val">100%</span></label>
                <input type="range" id="contrast" min="0" max="200" value="100">
            </div>
            <div class="slider-box">
                <label>Saturation <span id="s-val">100%</span></label>
                <input type="range" id="saturate" min="0" max="200" value="100">
            </div>
            <div class="slider-box">
                <label>Hue Rotate <span id="h-val">0deg</span></label>
                <input type="range" id="hue" min="0" max="360" value="0">
            </div>

            <div class="action-btns">
                <button class="btn-main btn-render" id="renderBtn"><i class="fa-solid fa-check-circle"></i> Apply Adjustments</button>
                <a id="downloadBtn" class="btn-main btn-download"><i class="fa-solid fa-download"></i> Download PNG</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const upload = document.getElementById('upload');
    const image = document.getElementById('image');
    const controls = document.getElementById('controls');
    const dropMsg = document.getElementById('dropMsg');
    const downloadBtn = document.getElementById('downloadBtn');

    // Filter Inputs
    const f = {
        b: document.getElementById('brightness'),
        c: document.getElementById('contrast'),
        s: document.getElementById('saturate'),
        h: document.getElementById('hue')
    };

    function getFilter() {
        return `brightness(${f.b.value}%) contrast(${f.c.value}%) saturate(${f.s.value}%) hue-rotate(${f.h.value}deg)`;
    }

    function syncUI() {
        document.getElementById('b-val').innerText = f.b.value + '%';
        document.getElementById('c-val').innerText = f.c.value + '%';
        document.getElementById('s-val').innerText = f.s.value + '%';
        document.getElementById('h-val').innerText = f.h.value + 'deg';
        if(document.querySelector('.cropper-container')) {
            document.querySelector('.cropper-container').style.filter = getFilter();
        }
    }

    Object.values(f).forEach(input => input.oninput = syncUI);

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                image.src = ev.target.result;
                dropMsg.style.display = 'none';
                image.style.display = 'block';
                if (cropper) cropper.destroy();
                image.onload = () => {
                    controls.style.display = 'block';
                    cropper = new Cropper(image, {
                        viewMode: 1,
                        dragMode: 'move', // Default move mode for easy adjustment
                        autoCropArea: 0.8,
                        background: false
                    });
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function setR(r, el) {
        cropper.setAspectRatio(r);
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('renderBtn').onclick = () => {
        const canvas = cropper.getCroppedCanvas({
            imageSmoothingQuality: 'high'
        });
        
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = canvas.width;
        finalCanvas.height = canvas.height;
        const ctx = finalCanvas.getContext('2d');

        ctx.filter = getFilter();
        ctx.drawImage(canvas, 0, 0);

        downloadBtn.href = finalCanvas.toDataURL('image/png');
        downloadBtn.download = 'studio_export.png';
        downloadBtn.style.display = 'block';
        alert("Photo Adjusted & Rendered! Download button is now active.");
    };
</script>

</body>
</html>
