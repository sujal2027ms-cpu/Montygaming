<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Photo Studio | Layout Fixed</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #007bff; --dark: #121212; --panel: #1e1e1e; --text: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* TOP: Photo Area (Bade mein) */
        .photo-viewer { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000; 
            position: relative;
            overflow: hidden;
        }
        #image { max-width: 100%; max-height: 100%; display: none; }
        .placeholder { font-size: 1.2rem; opacity: 0.4; text-align: center; }

        /* BOTTOM: Editing Panel */
        .control-panel { 
            background: var(--panel); 
            padding: 20px; 
            border-top: 2px solid #333;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }

        .section-title { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; letter-spacing: 1px; }

        /* Horizontal Scroll for Tools */
        .tool-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .btn-icon { 
            min-width: 50px; height: 50px; background: #333; border: none; 
            border-radius: 10px; color: white; cursor: pointer; font-size: 1.2rem;
            transition: 0.2s; flex-shrink: 0;
        }
        .btn-icon:hover { background: var(--primary); }

        /* Filters Grid */
        .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .filter-item { background: #2a2a2a; padding: 10px; border-radius: 8px; }
        .filter-item label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* Action Buttons */
        .action-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-main { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-upload { background: #fff; color: #000; }
        .btn-save { background: var(--primary); color: #fff; }
        .btn-reset { background: #ff4757; color: #fff; }
        
        #downloadLink { display: none; text-decoration: none; text-align: center; background: #2ed573; color: white; margin-top: 10px; }

        /* Hide scrollbar */
        .tool-bar::-webkit-scrollbar { height: 4px; }
        .tool-bar::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="photo-viewer" id="dropZone">
        <div class="placeholder" id="placeholder">
            <i class="fa-solid fa-image fa-3x"></i><br><br>
            Upload a photo to start
        </div>
        <img id="image">
    </div>

    <div class="control-panel" id="panel" style="display: none;">
        
        <div class="section-title">Transform & Adjust</div>
        <div class="tool-bar">
            <button class="btn-icon" onclick="cropper.zoom(0.1)" title="Zoom In"><i class="fa-solid fa-plus"></i></button>
            <button class="btn-icon" onclick="cropper.zoom(-0.1)" title="Zoom Out"><i class="fa-solid fa-minus"></i></button>
            <button class="btn-icon" onclick="cropper.rotate(-90)" title="Rotate L"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="btn-icon" onclick="cropper.rotate(90)" title="Rotate R"><i class="fa-solid fa-rotate-right"></i></button>
            <button class="btn-icon" onclick="cropper.scaleX(cropper.getData().scaleX === 1 ? -1 : 1)"><i class="fa-solid fa-arrows-left-right"></i></button>
            <button class="btn-icon" onclick="cropper.setDragMode('move')"><i class="fa-solid fa-hand"></i></button>
            <button class="btn-icon" onclick="cropper.setDragMode('crop')"><i class="fa-solid fa-crop"></i></button>
        </div>

        <div class="section-title">Filters</div>
        <div class="filters-grid">
            <div class="filter-item">
                <label>Brightness <span id="b-val">100%</span></label>
                <input type="range" id="brightness" min="0" max="200" value="100">
            </div>
            <div class="filter-item">
                <label>Contrast <span id="c-val">100%</span></label>
                <input type="range" id="contrast" min="0" max="200" value="100">
            </div>
            <div class="filter-item">
                <label>Saturate <span id="s-val">100%</span></label>
                <input type="range" id="saturate" min="0" max="200" value="100">
            </div>
            <div class="filter-item">
                <label>Blur <span id="bl-val">0px</span></label>
                <input type="range" id="blur" min="0" max="10" value="0">
            </div>
        </div>

        <div class="action-group">
            <button class="btn-main btn-reset" id="resetAll"><i class="fa-solid fa-undo"></i> Reset</button>
            <button class="btn-main btn-save" id="renderBtn"><i class="fa-solid fa-check"></i> Preview & Save</button>
        </div>
        
        <a id="downloadLink" class="btn-main">Download Final Photo</a>
    </div>

    <div style="padding: 15px; background: #121212;">
        <input type="file" id="uploadInput" hidden accept="image/*">
        <button class="btn-main btn-upload" onclick="document.getElementById('uploadInput').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i> Select New Image
        </button>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const uploadInput = document.getElementById('uploadInput');
    const image = document.getElementById('image');
    const panel = document.getElementById('panel');
    const placeholder = document.getElementById('placeholder');
    const downloadLink = document.getElementById('downloadLink');

    const filters = {
        b: document.getElementById('brightness'),
        c: document.getElementById('contrast'),
        s: document.getElementById('saturate'),
        bl: document.getElementById('blur')
    };

    function getFilterString() {
        return `brightness(${filters.b.value}%) contrast(${filters.c.value}%) saturate(${filters.s.value}%) blur(${filters.bl.value}px)`;
    }

    function updateFilters() {
        document.getElementById('b-val').innerText = filters.b.value + '%';
        document.getElementById('c-val').innerText = filters.c.value + '%';
        document.getElementById('s-val').innerText = filters.s.value + '%';
        document.getElementById('bl-val').innerText = filters.bl.value + 'px';
        if(document.querySelector('.cropper-container')) {
            document.querySelector('.cropper-container').style.filter = getFilterString();
        }
    }

    Object.values(filters).forEach(input => input.addEventListener('input', updateFilters));

    uploadInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                image.src = event.target.result;
                placeholder.style.display = 'none';
                image.style.display = 'block';
                if (cropper) cropper.destroy();
                image.onload = () => {
                    panel.style.display = 'block';
                    cropper = new Cropper(image, {
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        background: false,
                        ready() { updateFilters(); }
                    });
                };
            };
            reader.readAsDataURL(file);
        }
    };

    // Reset Button Logic
    document.getElementById('resetAll').onclick = () => {
        cropper.reset();
        filters.b.value = 100; filters.c.value = 100; 
        filters.s.value = 100; filters.bl.value = 0;
        updateFilters();
    };

    // Render & Preview
    document.getElementById('renderBtn').onclick = () => {
        const canvas = cropper.getCroppedCanvas();
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = canvas.width;
        finalCanvas.height = canvas.height;
        const ctx = finalCanvas.getContext('2d');
        ctx.filter = getFilterString();
        ctx.drawImage(canvas, 0, 0);

        downloadLink.href = finalCanvas.toDataURL('image/png');
        downloadLink.download = 'edited_photo.png';
        downloadLink.style.display = 'block';
        alert("Perfect! Photo is ready to download.");
    };
</script>

</body>
</html>
