<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Gradient Builder v9.2 (Animation Fixed)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --glass: rgba(10, 10, 10, 0.6); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; }
        /* FIX: Removed background-image transition to make sliders and animation super fast */
        #inner-bg { width: 100%; height: 100%; transition: filter 0.4s ease; background-size: 100% 100%; position: relative; }
        #inner-bg::before { content: ""; position: absolute; inset: 0; opacity: 0.12; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3"); }

        @keyframes flowAnim { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        /* FIX: Animation size reduced to 300% for better visibility */
        .anim-active { background-size: 300% 300% !important; animation: flowAnim var(--speed, 15s) ease-in-out infinite !important; }

        .ui-element { transition: all 0.3s ease; z-index: 1000; }
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; transform: translateY(-15px); }
        .sheet-hidden { transform: translateY(100%) !important; }

        .top-bar { position: fixed; top: 8px; left: 8px; right: 8px; display: flex; gap: 5px; justify-content: flex-end; }
        .btn-tiny { background: var(--glass); color: white; border: 1px solid var(--border); padding: 5px 8px; border-radius: 6px; font-size: 0.6rem; backdrop-filter: blur(15px); font-weight: 600; cursor: pointer; }

        .bottom-sheet { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); 
            border-top: 1px solid var(--border); padding: 6px 8px; 
            max-height: 38vh; overflow-y: auto; border-radius: 15px 15px 0 0;
        }

        .nav { display: flex; gap: 4px; margin-bottom: 6px; position: sticky; top: 0; z-index: 10; }
        .tab { background: rgba(255,255,255,0.05); color: #777; border: none; padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 700; cursor: pointer; }
        .tab.active { background: #fff; color: #000; }

        .card { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 5px 8px; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.05); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 3px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px var(--neon); cursor: pointer; }

        .color-circle { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #fff; position: relative; overflow: hidden; flex-shrink: 0; }
        input[type="color"] { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; }
        
        .btn-act { background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.08); padding: 6px; border-radius: 8px; font-size: 0.6rem; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 4px; cursor: pointer;}
        #css-box { font-size: 0.5rem; color: var(--neon); background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; word-break: break-all; font-family: monospace; border: 1px solid var(--border); white-space: pre-wrap; margin-top: 4px;}
        .val-badge { background: rgba(255,255,255,0.1); padding: 1px 3px; border-radius: 3px; font-family: monospace; font-size: 0.5rem; color: #eee;}
    </style>
</head>
<body>

<div id="bg-canvas" onclick="toggleUI()">
    <div id="inner-bg"></div>
</div>

<div class="top-bar ui-element" id="top-bar" data-html2canvas-ignore>
    <button id="css-btn" class="btn-tiny" onclick="copyCSS(event)" style="background: #fff; color: #000;">COPY CSS</button>
    <button class="btn-tiny" onclick="downloadImg(event)">SAVE</button>
</div>

<div class="bottom-sheet ui-element" id="sheet" onclick="event.stopPropagation()" data-html2canvas-ignore>
    <div class="nav">
        <button class="tab active" onclick="tab(event, 'col')">EDIT</button>
        <button class="tab" onclick="tab(event, 'fx')">FX</button>
    </div>

    <div id="col" class="section">
        <div class="card" style="display:flex; gap: 10px;">
            <div style="flex:1; display:flex; align-items:center; gap:5px;">
                <label style="color:#888; font-size:0.5rem;">ANG</label>
                <input type="range" id="tool-angle" min="0" max="360" value="135" oninput="gen()">
                <span class="val-badge" id="angle-disp">135°</span>
            </div>
            <div style="flex:1; display:flex; align-items:center; gap:5px;">
                <label style="color:#888; font-size:0.5rem;">BLR</label>
                <input type="range" id="tool-blur" min="0" max="40" value="0" oninput="gen()">
            </div>
        </div>
        
        <div id="layer-list"></div>
        <button class="btn-act" onclick="addLayer()"><i class="fa-solid fa-plus"></i> ADD COLOR</button>
    </div>

    <div id="fx" class="section" style="display:none;">
        <div class="card">
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="color:#888; font-size:0.5rem;">SPEED</label>
                <input type="range" id="speed" min="2" max="30" value="10" onchange="gen()">
                <button id="anim-toggle" class="btn-tiny" onclick="toggleAnimation()" style="padding:4px 8px; background: #00f2fe; color:#000;">PLAY</button>
            </div>
        </div>
        <div id="css-box">...</div>
    </div>
</div>

<script>
    // FIX: 3 Vibrant Colors added by default to make animation 100% visible
    let layers = [
        {h: "#ff007f", p: 0, o: 100},   // Hot Pink
        {h: "#7400b8", p: 50, o: 100},  // Deep Purple
        {h: "#00f2fe", p: 100, o: 100}  // Bright Cyan
    ];
    let isAnimOn = false;

    function toggleUI() { document.getElementById('top-bar').classList.toggle('ui-hidden'); document.getElementById('sheet').classList.toggle('sheet-hidden'); }
    function tab(e, name) {
        document.querySelectorAll('.section').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
    }

    function toggleAnimation() {
        isAnimOn = !isAnimOn;
        document.getElementById('inner-bg').classList.toggle('anim-active', isAnimOn);
        const animBtn = document.getElementById('anim-toggle');
        
        if(isAnimOn) {
            animBtn.innerText = "PAUSE";
            animBtn.style.background = "#ff4757"; // Red when playing
            animBtn.style.color = "#fff";
        } else {
            animBtn.innerText = "PLAY";
            animBtn.style.background = "#00f2fe"; // Cyan when paused
            animBtn.style.color = "#000";
        }
        gen();
    }

    function hexToRgba(hex, opacity) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${opacity / 100})`;
    }

    function render() {
        const list = document.getElementById('layer-list');
        list.innerHTML = '';
        layers.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.gap = '6px';
            
            div.innerHTML = `
                <div class="color-circle" style="background:${l.h}"><input type="color" value="${l.h}" oninput="upd(${i},'h',this.value)"></div>
                <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span style="color:#666; font-size:0.45rem; width:10px;">P</span>
                        <input type="range" min="0" max="100" value="${l.p}" oninput="upd(${i},'p',this.value)">
                        <span id="pos-badge-${i}" style="color:#eee; font-size:0.5rem; width:18px; text-align:right;">${l.p}%</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span style="color:#666; font-size:0.45rem; width:10px;">O</span>
                        <input type="range" min="0" max="100" value="${l.o}" oninput="upd(${i},'o',this.value)">
                        <span id="op-badge-${i}" style="color:#eee; font-size:0.5rem; width:18px; text-align:right;">${l.o}%</span>
                    </div>
                </div>
                <i class="fa-solid fa-times" onclick="rem(${i})" style="color:#ff4757; font-size:0.7rem; cursor:pointer; padding: 0 5px;"></i>
            `;
            list.appendChild(div);
        });
        gen();
    }

    function upd(i, k, v) { 
        layers[i][k] = (k === 'p' || k === 'o') ? parseFloat(v) : v; 
        
        if(k === 'h') {
            document.querySelectorAll('.color-circle')[i].style.background = v;
        } else if (k === 'p') {
            document.getElementById(`pos-badge-${i}`).innerText = v + '%';
        } else if (k === 'o') {
            document.getElementById(`op-badge-${i}`).innerText = v + '%';
        }
        gen(); 
    }

    function addLayer() { layers.push({h: "#ffffff", p: 100, o: 100}); render(); }
    function rem(i) { if(layers.length > 2) { layers.splice(i, 1); render(); } }

    function gen() {
        const speed = document.getElementById('speed').value;
        const bl = document.getElementById('tool-blur').value;
        const angle = document.getElementById('tool-angle').value;
        document.getElementById('angle-disp').innerText = angle + '°';
        
        const sorted = [...layers].sort((a,b) => a.p - b.p);
        const cStr = sorted.map(l => `${hexToRgba(l.h, l.o)} ${l.p}%`).join(', ');
        const grad = `linear-gradient(${angle}deg, ${cStr})`;
        
        const bg = document.getElementById('inner-bg');
        bg.style.backgroundImage = grad;
        bg.style.setProperty('--speed', speed + 's');
        bg.style.filter = `blur(${bl}px)`;
        
        let css = `background: ${grad};\n`;
        if (bl > 0) css += `filter: blur(${bl}px);\n`;
        if (isAnimOn) {
            css += `background-size: 300% 300%;\nanimation: flowAnim ${speed}s ease infinite;\n\n`;
            css += `/* Add this somewhere in your CSS */\n@keyframes flowAnim {\n  0% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}`;
        }
        document.getElementById('css-box').innerText = css;
    }

    function copyCSS(e) {
        e.stopPropagation();
        const textArea = document.createElement("textarea");
        textArea.value = document.getElementById('css-box').innerText;
        document.body.appendChild(textArea); textArea.select();
        document.execCommand('copy'); document.body.removeChild(textArea);
        const b = document.getElementById('css-btn'); 
        b.innerHTML = `<i class="fa-solid fa-check"></i> COPIED`;
        b.style.background = "#22c55e"; b.style.color = "#fff";
        setTimeout(() => { b.innerHTML = "COPY CSS"; b.style.background = "#fff"; b.style.color = "#000"; }, 1500);
    }

    function downloadImg(e) {
        e.stopPropagation();
        document.getElementById('sheet').classList.add('sheet-hidden');
        document.getElementById('top-bar').classList.add('ui-hidden'); 
        setTimeout(() => {
            html2canvas(document.body).then(canvas => {
                const a = document.createElement('a'); a.download = 'monty-gradient.png'; a.href = canvas.toDataURL(); a.click();
                document.getElementById('sheet').classList.remove('sheet-hidden');
                document.getElementById('top-bar').classList.remove('ui-hidden');
            });
        }, 300); 
    }
    render();
</script>
</body>
</html>
