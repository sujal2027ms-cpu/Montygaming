<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Gradient Builder v12 (TV & Universal Edition)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2fe; --glass: rgba(10, 10, 10, 0.75); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }

        /* FIX: TV ke liye explicitly Width, Height, Top, Left set kiya hai */
        #bg-canvas { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            width: 100vw; height: 100vh; 
            z-index: 1; cursor: pointer; 
        }
        
        #inner-bg { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0;
            background-size: 100% 100%;
        }
        
        /* FIX: TV par mix-blend-mode crash karta hai, isliye sirf opacity rakhi hai */
        #inner-bg::before { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0.1; pointer-events: none; 
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAX0lEQVQYV2N89+7dfwYc4P379/8ZEONgBpoIcgGIfPjwof8sXwYGIAGQBpA8SDwIQQHkg8SAEshmITuB7AAJIHsB2QuSBiEogOyHJBikG0UhyAVQhSGxIA2IjiIXgBwAABk3Q27+c7IAAAAASUVORK5CYII="); 
            background-repeat: repeat;
        }

        @keyframes flowAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .anim-active { background-size: 300% 300% !important; animation: flowAnim var(--speed, 15s) ease-in-out infinite !important; }

        .toolbox { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            width: 320px; 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            padding: 15px; 
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex; 
            flex-direction: column;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .toolbox.ui-hidden { opacity: 0; pointer-events: none; transform: scale(0.9) translate(20px, -20px); }

        @media (max-width: 768px) {
            .toolbox {
                top: auto; bottom: 0; right: 0; left: 0;
                width: 100%;
                border-radius: 20px 20px 0 0;
                padding: 12px;
                max-height: 50vh;
            }
            .toolbox.ui-hidden { transform: translateY(100%); }
        }

        .action-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-tiny { flex: 1; justify-content: center; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); padding: 8px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .btn-tiny:hover { background: rgba(255,255,255,0.2); }

        .nav { display: flex; gap: 6px; margin-bottom: 10px; }
        .tab { flex: 1; background: rgba(255,255,255,0.05); color: #888; border: none; padding: 6px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; cursor: pointer; }
        .tab.active { background: #fff; color: #000; }

        .card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.05); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 5px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px var(--neon); cursor: pointer; }

        .color-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #fff; position: relative; overflow: hidden; flex-shrink: 0; }
        input[type="color"] { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; }
        
        .btn-act { background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.08); padding: 8px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 4px; cursor: pointer;}
        .btn-act:hover { background: rgba(255,255,255,0.1); }
        
        #css-box { font-size: 0.55rem; color: var(--neon); background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; word-break: break-all; font-family: monospace; border: 1px solid var(--border); white-space: pre-wrap; margin-top: 5px;}
        .val-badge { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.55rem; color: #eee;}
    </style>
</head>
<body>

<div id="bg-canvas" onclick="toggleUI()">
    <div id="inner-bg"></div>
</div>

<div class="toolbox" id="toolbox">
    <div class="action-row">
        <button id="css-btn" class="btn-tiny" onclick="copyCSS(event)" style="background: #fff; color: #000;">
            <i class="fa-solid fa-code"></i> COPY CSS
        </button>
        <button id="save-btn" class="btn-tiny" onclick="downloadNativeImg(event)" style="background: #22c55e; color: #fff; border:none;">
            <i class="fa-solid fa-download"></i> HD SAVE
        </button>
    </div>

    <div class="nav">
        <button class="tab active" onclick="tab(event, 'col')">EDIT</button>
        <button class="tab" onclick="tab(event, 'fx')">EFFECTS</button>
    </div>

    <div id="col" class="section">
        <div class="card" style="display:flex; gap: 15px;">
            <div style="flex:1; display:flex; align-items:center; gap:6px;">
                <label style="color:#888; font-size:0.55rem; font-weight:bold;">ANG</label>
                <input type="range" id="tool-angle" min="0" max="360" value="135" oninput="gen()">
                <span class="val-badge" id="angle-disp">135°</span>
            </div>
            <div style="flex:1; display:flex; align-items:center; gap:6px;">
                <label style="color:#888; font-size:0.55rem; font-weight:bold;">BLR</label>
                <input type="range" id="tool-blur" min="0" max="40" value="0" oninput="gen()">
            </div>
        </div>
        
        <div id="layer-list"></div>
        <button class="btn-act" onclick="addLayer()"><i class="fa-solid fa-plus"></i> ADD COLOR</button>
    </div>

    <div id="fx" class="section" style="display:none;">
        <div class="card">
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="color:#888; font-size:0.55rem; font-weight:bold;">SPEED</label>
                <input type="range" id="speed" min="2" max="30" value="10" onchange="gen()">
                <button id="anim-toggle" class="btn-tiny" onclick="toggleAnimation()" style="background: #00f2fe; color:#000; padding:6px 12px; margin:0; flex:none;">PLAY</button>
            </div>
        </div>
        <div id="css-box">...</div>
    </div>
</div>

<script>
    let layers = [
        {h: "#ff007f", p: 0, o: 100},   
        {h: "#7400b8", p: 50, o: 100},  
        {h: "#00f2fe", p: 100, o: 100}  
    ];
    let isAnimOn = false;

    function toggleUI() { 
        document.getElementById('toolbox').classList.toggle('ui-hidden'); 
    }
    
    function tab(e, name) {
        document.querySelectorAll('.section').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).style.display = 'block';
        if(e) e.currentTarget.classList.add('active');
    }

    function toggleAnimation() {
        isAnimOn = !isAnimOn;
        document.getElementById('inner-bg').classList.toggle('anim-active', isAnimOn);
        const animBtn = document.getElementById('anim-toggle');
        
        if(isAnimOn) {
            animBtn.innerText = "PAUSE";
            animBtn.style.background = "#ff4757"; 
            animBtn.style.color = "#fff";
        } else {
            animBtn.innerText = "PLAY";
            animBtn.style.background = "#00f2fe"; 
            animBtn.style.color = "#000";
        }
        gen();
    }

    function hexToRgba(hex, opacity) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${opacity / 100})`;
    }

    function render() {
        const list = document.getElementById('layer-list');
        list.innerHTML = '';
        layers.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.gap = '8px';
            
            div.innerHTML = `
                <div class="color-circle" style="background:${l.h}"><input type="color" value="${l.h}" oninput="upd(${i},'h',this.value)"></div>
                <div style="flex:1; display:flex; flex-direction:column; gap:4px;">
                    <div style="display:flex; align-items:center; gap:6px;">
                        <span style="color:#666; font-size:0.5rem; font-weight:bold; width:12px;">P</span>
                        <input type="range" min="0" max="100" value="${l.p}" oninput="upd(${i},'p',this.value)">
                        <span id="pos-badge-${i}" style="color:#eee; font-size:0.5rem; width:22px; text-align:right;">${l.p}%</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:6px;">
                        <span style="color:#666; font-size:0.5rem; font-weight:bold; width:12px;">O</span>
                        <input type="range" min="0" max="100" value="${l.o}" oninput="upd(${i},'o',this.value)">
                        <span id="op-badge-${i}" style="color:#eee; font-size:0.5rem; width:22px; text-align:right;">${l.o}%</span>
                    </div>
                </div>
                <i class="fa-solid fa-times" onclick="rem(${i})" style="color:#ff4757; font-size:0.8rem; cursor:pointer; padding: 5px;"></i>
            `;
            list.appendChild(div);
        });
        gen();
    }

    function upd(i, k, v) { 
        layers[i][k] = (k === 'p' || k === 'o') ? parseFloat(v) : v; 
        
        if(k === 'h') {
            document.querySelectorAll('.color-circle')[i].style.background = v;
        } else if (k === 'p') {
            document.getElementById(`pos-badge-${i}`).innerText = v + '%';
        } else if (k === 'o') {
            document.getElementById(`op-badge-${i}`).innerText = v + '%';
        }
        gen(); 
    }

    function addLayer() { layers.push({h: "#ffffff", p: 100, o: 100}); render(); }
    function rem(i) { if(layers.length > 2) { layers.splice(i, 1); render(); } }

    function gen() {
        const speed = document.getElementById('speed').value;
        const bl = document.getElementById('tool-blur').value;
        const angle = document.getElementById('tool-angle').value;
        document.getElementById('angle-disp').innerText = angle + '°';
        
        const sorted = [...layers].sort((a,b) => a.p - b.p);
        const cStr = sorted.map(l => `${hexToRgba(l.h, l.o)} ${l.p}%`).join(', ');
        const grad = `linear-gradient(${angle}deg, ${cStr})`;
        
        const bg = document.getElementById('inner-bg');
        bg.style.backgroundImage = grad;
        bg.style.setProperty('--speed', speed + 's');
        bg.style.filter = `blur(${bl}px)`;
        
        let css = `background: ${grad};\n`;
        if (bl > 0) css += `filter: blur(${bl}px);\n`;
        if (isAnimOn) {
            css += `background-size: 300% 300%;\nanimation: flowAnim ${speed}s ease infinite;\n\n`;
            css += `@keyframes flowAnim {\n  0% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}`;
        }
        document.getElementById('css-box').innerText = css;
    }

    function copyCSS(e) {
        e.stopPropagation();
        const textArea = document.createElement("textarea");
        textArea.value = document.getElementById('css-box').innerText;
        document.body.appendChild(textArea); textArea.select();
        document.execCommand('copy'); document.body.removeChild(textArea);
        
        const b = document.getElementById('css-btn'); 
        const oldHTML = b.innerHTML;
        b.innerHTML = `<i class="fa-solid fa-check"></i> COPIED`;
        b.style.background = "#22c55e"; b.style.color = "#fff";
        
        setTimeout(() => { 
            b.innerHTML = oldHTML; 
            b.style.background = "#fff"; 
            b.style.color = "#000"; 
        }, 1500);
    }

    function downloadNativeImg(e) {
        e.stopPropagation();
        const btn = document.getElementById('save-btn');
        const toolbox = document.getElementById('toolbox');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> SAVING...`;

        setTimeout(() => {
            try {
                toolbox.style.display = 'none';

                const canvas = document.createElement('canvas');
                const scale = 2; 
                const w = window.innerWidth * scale;
                const h = window.innerHeight * scale;
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');

                const angle = parseInt(document.getElementById('tool-angle').value);
                const blur = parseInt(document.getElementById('tool-blur').value);
                
                if(blur > 0) ctx.filter = `blur(${blur * scale}px)`;

                ctx.translate(w/2, h/2);
                ctx.rotate(angle * Math.PI / 180);
                
                const size = Math.sqrt(w*w + h*h);
                const grd = ctx.createLinearGradient(0, size/2, 0, -size/2);

                const sorted = [...layers].sort((a,b) => a.p - b.p);
                sorted.forEach(l => {
                    grd.addColorStop(l.p / 100, hexToRgba(l.h, l.o));
                });

                ctx.fillStyle = grd;
                ctx.fillRect(-size, -size, size*2, size*2);

                ctx.resetTransform();
                ctx.filter = 'none';

                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAX0lEQVQYV2N89+7dfwYc4P379/8ZEONgBpoIcgGIfPjwof8sXwYGIAGQBpA8SDwIQQHkg8SAEshmITuB7AAJIHsB2QuSBiEogOyHJBikG0UhyAVQhSGxIA2IjiIXgBwAABk3Q27+c7IAAAAASUVORK5CYII=";
                
                img.onload = () => {
                    ctx.globalAlpha = 0.15;
                    ctx.globalCompositeOperation = 'overlay';
                    const pattern = ctx.createPattern(img, 'repeat');
                    ctx.fillStyle = pattern;
                    ctx.fillRect(0, 0, w, h);

                    const a = document.createElement('a');
                    a.download = 'monty-pro-gradient.png';
                    a.href = canvas.toDataURL('image/png', 1.0);
                    a.click();
                    
                    toolbox.style.display = 'flex';
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> SAVED!`;
                    setTimeout(() => btn.innerHTML = originalHTML, 1500);
                };
            } catch (err) {
                alert("Download Error: Kripya try again karein.");
                toolbox.style.display = 'flex';
                btn.innerHTML = originalHTML;
            }
        }, 100);
    }
    
    render();
</script>
</body>
</html>
