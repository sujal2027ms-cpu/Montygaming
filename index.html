<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Black Calculator - Proper Symbols</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .calculator {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 40px 15px;
        }

        #screen {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            text-align: right;
            color: #ffffff;
            font-size: 4.5rem;
            font-weight: 200;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding-bottom: 40px;
        }

        .btn {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            background: #1c1c1e;
            color: #ffffff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            position: relative;
        }

        .clear-btn {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 70px;
            border-radius: 50px;
            background: #2c2c2e;
            color: #ff4757;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            gap: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .clear-btn::before { content: '✕'; font-size: 1.2rem; }

        .clear-btn .progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #ff4757;
            width: 0%;
            transition: width 0.3s linear;
        }

        .btn:active { transform: scale(0.92); background: #3a3a3c; }

        .operator {
            background: #2c2c2e;
            color: #00ff9d;
            font-weight: 600;
            font-size: 2rem;
        }

        .equal { background: #00ff9d; color: #000; font-weight: bold; }

        .back-text { font-size: 0.8rem; color: #ffa502; font-weight: bold; }

        @media (min-width: 500px) {
            .calculator { height: 90vh; border: 1px solid #222; border-radius: 40px; }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <input type="text" id="screen" value="0" readonly>
        </div>
        
        <div class="buttons">
            <button class="btn clear-btn" id="cButton">
                CANCEL
                <div class="progress" id="pBar"></div>
            </button>
            <button class="btn operator" onclick="appendToScreen('÷')">÷</button>
            <button class="btn operator" onclick="appendToScreen('×')">×</button>
            
            <button class="btn" onclick="appendToScreen('7')">7</button>
            <button class="btn" onclick="appendToScreen('8')">8</button>
            <button class="btn" onclick="appendToScreen('9')">9</button>
            <button class="btn operator" onclick="appendToScreen('-')">−</button>
            
            <button class="btn" onclick="appendToScreen('4')">4</button>
            <button class="btn" onclick="appendToScreen('5')">5</button>
            <button class="btn" onclick="appendToScreen('6')">6</button>
            <button class="btn operator" onclick="appendToScreen('+')">+</button>
            
            <button class="btn" onclick="appendToScreen('1')">1</button>
            <button class="btn" onclick="appendToScreen('2')">2</button>
            <button class="btn" onclick="appendToScreen('3')">3</button>
            <button class="btn equal" onclick="calculate()">=</button>
            
            <button class="btn" onclick="appendToScreen('0')">0</button>
            <button class="btn" onclick="appendToScreen('.')">.</button>
            <button class="btn back-text" style="grid-column: span 2; width: 100%; border-radius: 50px; aspect-ratio: auto;" onclick="backspace()">BACKSPACE</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const cButton = document.getElementById('cButton');
        const pBar = document.getElementById('pBar');
        let pressTimer;
        let isLongPress = false;

        function appendToScreen(value) {
            if (screen.value === '0' || screen.value === 'Error') screen.value = value;
            else screen.value += value;
        }

        function calculate() {
            try {
                // UI symbols ko math operators mein replace karne ka logic
                let expression = screen.value.replace(/×/g, '*').replace(/÷/g, '/');
                
                const result = Function('"use strict";return (' + expression + ')')();
                screen.value = Number.isInteger(result) ? result : result.toFixed(4).replace(/\.?0+$/, "");
            } catch (e) {
                screen.value = "Error";
                setTimeout(() => screen.value = "0", 1000);
            }
        }

        function backspace() {
            if (screen.value.length > 1 && screen.value !== "Error") screen.value = screen.value.slice(0, -1);
            else screen.value = "0";
        }

        // Fast Cancel Logic (0.3s)
        const startPress = (e) => {
            e.preventDefault();
            isLongPress = false;
            pBar.style.width = '100%'; 
            pressTimer = setTimeout(() => {
                isLongPress = true;
                screen.value = "0";
                screen.style.opacity = "0.3";
                setTimeout(() => screen.style.opacity = "1", 100);
            }, 300);
        };

        const endPress = (e) => {
            clearTimeout(pressTimer);
            pBar.style.width = '0%';
            if (!isLongPress) backspace();
        };

        cButton.addEventListener('mousedown', startPress);
        cButton.addEventListener('mouseup', endPress);
        cButton.addEventListener('touchstart', startPress);
        cButton.addEventListener('touchend', endPress);
        cButton.addEventListener('mouseleave', () => {
            clearTimeout(pressTimer);
            pBar.style.width = '0%';
        });
    </script>
</body>
</html>
